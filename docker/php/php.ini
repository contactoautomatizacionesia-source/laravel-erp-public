; =============================================================================
; PHP custom config — amazingsite-erp
; Cargado como /usr/local/etc/php/conf.d/99-app.ini
; =============================================================================

[PHP]
; Memoria y ejecución
memory_limit = 512M
max_execution_time = 120
max_input_time = 120

; Uploads
upload_max_filesize = 64M
post_max_size = 68M
max_file_uploads = 20

; Strings
max_input_vars = 5000

; Error handling (producción: solo log, no display)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Timezone
date.timezone = America/Bogota

; Session (Redis en producción, file en dev)
session.save_handler = files
session.gc_maxlifetime = 7200

; Realpath cache (mejora performance de autoload)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Expose
expose_php = Off
