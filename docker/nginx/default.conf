server {
    listen 80;
    server_name _;

    root /var/www;
    index index.php index.html;

    charset utf-8;

    # Resolver interno de Docker — difiere la resolucion DNS del upstream
    # al momento de cada request en vez de al arrancar nginx. Sin esto,
    # si el contenedor 'app' no esta listo cuando nginx inicia, falla con
    # 'host not found in upstream'.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Tamaño máximo de upload (sincronizado con php.ini)
    client_max_body_size 64M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files — cache aggressivo
    # Se excluyen rutas de Livewire: livewire.js es una ruta PHP dinámica,
    # no un archivo en disco. Sin esta exclusión nginx devuelve 404 antes
    # de que la petición llegue a PHP-FPM.
    location ~* ^(?!/livewire/)\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        # Variable necesaria para que el resolver difiera la lookup a runtime
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts — Browsershot puede tardar en generar PDFs
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        # Buffers para respuestas grandes
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    # Denegar acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Denegar acceso directo a vendor/
    location ~ ^/vendor/ {
        deny all;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
