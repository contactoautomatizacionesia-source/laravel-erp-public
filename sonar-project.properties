# =====================================================
# SonarQube - Proyecto Laravel (AmazCart ERP)
# =====================================================

# 1. Conexión al servidor SonarQube
sonar.host.url=https://sonar.igni-soft.com
# sonar.token → se pasa vía variable de entorno SONAR_TOKEN

# 2. Identificación del Proyecto
sonar.projectKey=DaruinHerreraIgniweb_amazingsite-erp_0adb0749-69e5-4fb8-b95b-218ab3f0c548
sonar.projectName=AmazCart ERP - Laravel
sonar.projectVersion=1.0

# 3. Fuentes PHP a analizar
sonar.sources=app,Modules,routes,config,database,resources
sonar.tests=tests,Modules
sonar.test.inclusions=Modules/*/Tests/**, tests/**
sonar.sourceEncoding=UTF-8

# 4. Lenguaje y Versión
sonar.language=php
sonar.php.version=8.3

# 5. Exclusiones de Análisis (Ignorados completamente)
# Se eliminan archivos compilados, dependencias y assets que no requieren revisión lógica
sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  public/**,\
  storage/**,\
  bootstrap/cache/**,\
  resources/js/**,\
  resources/css/**,\
  **/*.min.js,\
  **/*.min.css,\
  database/factories/**,\
  database/seeders/**,\
  **/*.py,\
  Modules/**/Resources/assets/**,\
  Modules/**/Resources/js/**,\
  Modules/**/Resources/css/**,\
  resources/views/**/*.js

# 6. Exclusiones de cobertura (Archivos que no requieren tests unitarios)
sonar.coverage.exclusions=\
  app/Console/**,\
  app/Exceptions/**,\
  app/Providers/**,\
  app/Http/Middleware/**,\
  database/**,\
  routes/**,\
  config/**,\
  Modules/**/Providers/**,\
  Modules/**/Database/**

# 6b. Exclusiones de duplicados (CPD)
sonar.cpd.exclusions=\
  resources/lang/**,\
  Modules/**/Resources/lang/**,\
  database/migrations/**,\
  database/seeders/**,\
  Modules/**/Database/Migrations/**,\
  Modules/**/Database/Seeders/**,\
  tests/**,\
  Modules/**/Tests/**,\
  config/**,\
  Modules/*/Providers/*.php,\
  Modules/**/Providers/RouteServiceProvider.php

# =====================================================
# 7. REGLAS ESPECÍFICAS (MULTICRITERIA) - SOLUCIÓN A ISSUES
# =====================================================
# e1: Métodos boot() vacíos | e2: Etiquetas <li> sin <ul> | e3: Literales duplicados (/data)
sonar.issue.ignore.multicriteria=e1,e2,e3

# [Issue image_a8169d] Ignorar métodos heredados redundantes en Providers
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1185
sonar.issue.ignore.multicriteria.e1.resourceKey=Modules/**/Providers/*.php

# [Issue image_9b601e / image_9b4d3d] Ignorar <li> huérfanos en vistas de menú de módulos
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:ItemTagNotWithinContainerTagCheck
sonar.issue.ignore.multicriteria.e2.resourceKey=Modules/**/Resources/views/**/menu.blade.php

# [Issue image_b96bdf] Ignorar duplicación de literales en archivos de rutas
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=routes/**/*.php,Modules/**/Routes/*.php

# =====================================================

# 8. Reporte de cobertura (Generado externamente con PHPUnit)
sonar.php.coverage.reportPaths=coverage.xml