# =============================================================================
# docker-compose.dev.yml — Override para desarrollo local (WSL)
#
# En desarrollo, el código se monta via bind mount (.:/var/www) y los archivos
# dinámicos (uploads, logs, invoices) viven en la carpeta del proyecto.
# STORAGE_BASE=. en .env → los bind mounts del base apuntan al proyecto.
#
# Uso DESDE WSL (proyecto en ext4, ej: ~/projects/amazingsite-erp):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# O con alias (agregar a ~/.bashrc):
#   alias dc='docker compose -f docker-compose.yml -f docker-compose.dev.yml'
#   dc up -d
#   dc exec app php artisan migrate
# =============================================================================

services:
  # ── Nginx: usa código del host en vez de la imagen ────────────────────────
  nginx:
    ports:
      - "8080:80"             # Evita conflicto con Apache/WAMP en :80
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www:ro

  # ── App: bind mount + skip setup + opcache dev ────────────────────────────
  app:
    environment:
      - CONTAINER_ROLE=app
      - SKIP_SETUP=true
    volumes:
      - .:/var/www                                                          # código fuente en vivo
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro              # entrypoint en vivo
      - ./docker/php/opcache-dev.ini:/usr/local/etc/php/conf.d/zz-opcache-dev.ini:ro
      - /var/www/vendor                                                     # preserva vendor de la imagen
      - /var/www/node_modules                                               # preserva node_modules de la imagen

  # ── Worker: bind mount code ───────────────────────────────────────────────
  worker:
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules

  # ── Scheduler: bind mount code ────────────────────────────────────────────
  scheduler:
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
